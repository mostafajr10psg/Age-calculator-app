<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Age Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="CSS/main.css" />
  </head>
  <body class="d-flex jc-center ai-center">
    <main>
      <h1 class="visually-hidden">Age Calculator</h1>
      <section class="calc-user-age p-relative">
        <form>
          <fieldset class="user-birthdate d-flex">
            <legend class="visually-hidden">User Birthdate</legend>
            <div class="day">
              <label class="day motion" for="day">Day</label>
              <input
                class="motion"
                id="day"
                type="number"
                name="day"
                data-invalid-range="must be a valid day"
                required
                aria-describedby="day-error"
                placeholder="dd"
                min="1"
                max="31"
              />
              <p id="day-error" class="error-msg hidden">This field is required</p>
            </div>
            <div class="month">
              <label class="month motion" for="month">Month</label>
              <input
                class="motion"
                id="month"
                type="number"
                name="month"
                data-invalid-range="must be a valid month"
                required
                aria-describedby="month-error"
                placeholder="mm"
                min="1"
                max="12"
              />
              <p id="month-error" class="error-msg hidden">This field is required</p>
            </div>
            <div class="year">
              <label class="year motion" for="year">Year</label>
              <input
                class="motion"
                id="year"
                type="number"
                name="year"
                data-invalid-range="must be a valid year"
                required
                aria-describedby="year-error"
                placeholder="yyyy"
                min="1700"
              />
              <p id="year-error" class="error-msg hidden">This field is required</p>
            </div>
          </fieldset>
          <button
            class="d-flex jc-center ai-center p-relative motion"
            type="submit"
            aria-label="Calculate age"
          >
            <img class="motion" src="assets/images/icon-arrow.svg" alt="" />
          </button>
        </form>
      </section>

      <section class="age-result">
        <h2 class="visually-hidden">Age Result</h2>
        <output for="day month year" aria-live="polite">
          <p class="years d-flex ai-center">
            <span class="year-result">--</span>
            years
          </p>
          <p class="months d-flex ai-center">
            <span class="month-result">--</span>
            months
          </p>
          <p class="days d-flex ai-center">
            <span class="day-result">--</span>
            days
          </p>
        </output>
      </section>
    </main>
    <script src="master.js"></script>
  </body>
</html>
