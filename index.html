<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Age Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="CSS/main.css" />
  </head>
  <body class="d-flex jc-center ai-center">
    <main>
      <h1 class="visually-hidden">Age Calculator</h1>
      <form class="calc-user-age p-relative">
        <div class="user-birthdate d-flex">
          <div class="day">
            <label class="day" for="day">Day</label>
            <input
              id="day"
              type="number"
              name="day"
              aria-describedby="day-error"
              aria-invalid="true"
              placeholder="dd"
              min="1"
              max="31"
            />
            <p id="day-error" class="error-msg hidden">This field is required</p>
          </div>
          <div class="month">
            <label class="month" for="month">Month</label>
            <input
              id="month"
              type="number"
              name="month"
              aria-describedby="month-error"
              aria-invalid="true"
              placeholder="mm"
              min="1"
              max="12"
            />
            <p id="month-error" class="error-msg hidden">This field is required</p>
          </div>
          <div class="year">
            <label class="year" for="year">Year</label>
            <input
              id="year"
              type="number"
              name="year"
              aria-describedby="year-error"
              aria-invalid="true"
              placeholder="yyyy"
            />
            <p id="year-error" class="error-msg hidden">This field is required</p>
          </div>
        </div>
        <button
          class="d-flex jc-center ai-center p-relative"
          type="submit"
          aria-label="Calculate age"
        >
          <img src="assets/images/icon-arrow.svg" alt="" />
        </button>
      </form>

      <section class="user-age">
        <p class="years d-flex ai-center">
          <output id="year" name="year">--</output>
          years
        </p>
        <p class="months d-flex ai-center">
          <output id="month" name="month">--</output>
          months
        </p>
        <p class="days d-flex ai-center">
          <output id="day" name="day">--</output>
          days
        </p>
      </section>
    </main>
    <script src="master.js"></script>
  </body>
</html>
